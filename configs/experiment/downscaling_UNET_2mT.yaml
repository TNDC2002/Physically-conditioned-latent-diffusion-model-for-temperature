# @package _global_

# to execute this experiment run:
# python src/train.py experiment=downscaling_UNET_2mT

defaults:
  - override /model: unet.yaml
  - override /logger: tensorboard.yaml
  - override /trainer: gpu.yaml
  

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["downscaling", "unet_2mT"]

data:
  target_vars:
    high_res: ['2mT']
  batch_size: 32   # override default 8 to better use ~80GB GPU (was ~18GB at bs=8)

# Resume training: set ckpt_path and trainer.max_epochs at ROOT level (same as "data", not indented under it)
ckpt_path: /home/chuongtnd/git-repo/Physically-conditioned-latent-diffusion-model-for-temperature/logs/train/runs/2026-03-14_06-45-07/checkpoints/last.ckpt
trainer:
  max_epochs: 50

callbacks:
  model_checkpoint:
    filename: "UNET_2mT_epoch_{epoch:03d}"