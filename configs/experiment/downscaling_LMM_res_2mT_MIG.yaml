# @package _global_
#
# LMM on a single H100 MIG slice (3g.40gb): smaller batch than full-GPU run.
# Submit: bash configs/experiment/Submitscript_MIG_LMM.sh
#
# Local: PROJECT_ROOT=$PWD python src/train.py experiment=downscaling_LMM_res_2mT_MIG

defaults:
  - override /model: lmm.yaml
  - override /logger: tensorboard.yaml
  - override /trainer: gpu.yaml

tags: ["downscaling", "lmm_res_2mT", "mig"]

load_optimizer_state: false

data:
  target_vars:
    high_res: ["2mT"]
  crop_size: 512
  batch_size: 8
  num_workers: 2
  nn_lowres: false

model:
  use_ema: true
  pde_lambda: 0.1
  temp_pde_coef: .00000000001
  temp_energy_coef:  0
  pde_mode: "temp"
  temp_pde_num_supercells: 8
  autoencoder:
    unet_regr:
      ckpt_path: ${paths.pretrained_models_dir}UNET_2mT.ckpt
  ae_load_state_file: ${paths.pretrained_models_dir}VAE_residual_2mT.ckpt

callbacks:
  model_checkpoint:
    filename: "LMM_res_2mT_MIG_epoch_{epoch:03d}"
