# @package _global_
#
# Run: python src/train.py experiment=downscaling_LMM_res_2mT
# MIG (smaller batch): experiment=downscaling_LMM_res_2mT_MIG — see Submitscript_MIG_LMM.sh
# GPU smoke (parity + metrics + micro-train): sbatch configs/experiment/Submitscript_LMM_MIG.sh
#
# Point ``model.autoencoder.unet_regr.ckpt_path`` and ``model.ae_load_state_file`` to your
# Stage-0 UNET and Stage-1 VAE checkpoints (see downscaling_LDM_res_2mT.yaml).

defaults:
  - override /model: lmm.yaml
  - override /logger: tensorboard.yaml
  - override /trainer: gpu.yaml

tags: ["downscaling", "lmm_res_2mT"]

load_optimizer_state: false

data:
  target_vars:
    high_res: ["2mT"]
  crop_size: 512
  batch_size: 32
  num_workers: 2
  nn_lowres: false

model:
  use_ema: true
  pde_lambda: 0.1
  temp_pde_coef: .00000000001
  temp_energy_coef:  0
  pde_mode: "temp"
  temp_pde_num_supercells: 8
  autoencoder:
    unet_regr:
      ckpt_path: ${paths.pretrained_models_dir}UNET_2mT.ckpt
  ae_load_state_file: ${paths.pretrained_models_dir}VAE_residual_2mT.ckpt
