_target_: src.models.unet_module.UnetLitModule

net:
  _target_: src.models.components.unet.DownscalingUnet
  in_ch: 32
  out_ch: 1
  features: [64,128,256,512]

loss:
  _target_: torch.nn.MSELoss
  reduction: mean

optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: 0.001
  weight_decay: 0.0

# Optional learning rate scheduler; used in `configure_optimizers` if not null.
# This mirrors the ReduceLROnPlateau usage in the AE/LDM modules, but monitors UNET's `val/loss`.
scheduler:
  _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
  _partial_: true
  mode: min
  factor: 0.5
  patience: 3
  verbose: true