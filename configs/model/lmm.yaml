# Latent Meanflow Model (LMM): MeanFlow on z_R (latent residual), parallel to ldm.yaml.
#
# PDE decode source (L-F design lock): during training, temperature PDE / energy use the field
# obtained by decoding ``single_step_generate(x_t, t, r, mf_unet(x_t,t,r,context))`` — a one-step
# latent estimate, not a raw MF velocity tensor and not DDIM.

_target_: src.models.lmm_module.LatentMeanFlowLitModule

mf_unet:
  _target_: src.models.components.ldm.denoiser.MFUNet
  in_channels: 32
  model_channels: 256
  out_channels: 32
  num_res_blocks: 2
  attention_resolutions: [1, 2]
  dims: 2
  channel_mult: [1, 2, 4]
  num_heads: 8
  context_ch: [256, 512, 1024]
  time_scale: 1000
  separate_r_mlp: false

meanflow_core:
  _target_: src.models.components.meanflow.meanflow_core.MeanFlowCore
  flow_ratio: 0.5
  time_dist: lognorm
  time_mu: -0.4
  time_sigma: 1.0

# If true, ``meanflow_core`` above is still instantiated by Hydra but ignored; training uses
# ``MeanFlowPaperCore`` (``MeanFlow/loss.py`` math). Optional kwargs: ``meanflow_paper``.
use_meanflow_paper_core: true
meanflow_paper: null

autoencoder:
  _target_: src.models.ae_module.AutoencoderKL
  encoder:
    _target_: src.models.components.ae.SimpleConvEncoder
    levels: 3
  decoder:
    _target_: src.models.components.ae.SimpleConvDecoder
    levels: 3
  unet_regr:
    _target_: src.models.unet_module.UnetLitModule
    net:
      _target_: src.models.components.unet.DownscalingUnet
      in_ch: 32
      out_ch: 1
      features: [64, 128, 256, 512]
    loss:
      _target_: torch.nn.MSELoss
      reduction: mean
    optimizer: null
  ae_flag: "residual"

context_encoder:
  _target_: src.models.components.ldm.conditioner.AFNOConditionerNetCascade
  autoencoder:
    - _target_: src.models.ae_module.AutoencoderKL
      encoder:
        _target_: src.models.components.ae.SimpleConvEncoder
        in_dim: 18
        levels: 3
        ch_mult: 3
      decoder: null
    - _target_: src.models.ae_module.EncoderLRES
  train_autoenc: true
  cascade_depth: 3
  embed_dim: [128, 24]
  analysis_depth: [4, 4]
  afno_fusion: true
  input_size_ratios: [1, 1]
  embed_dim_out: 256

lr: 1e-4
lr_warmup: 0
use_ema: true
loss_type: l2

pde_lambda: 0.0
pde_mode: "temp"
temp_pde_coef: 0.0
temp_energy_coef: 0.0
temp_pde_num_supercells: 8

ae_load_state_file: null
